name: build

on:
  push:
    tags:
      - "v*"

env:
  IS_STABLE: ${{ !contains(github.ref, '-') }}

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            arch: amd64
            artifact_suffix: windows-amd64
            yy_thunks: false
          - platform: windows
            os: windows-latest
            arch: amd64
            artifact_suffix: windows-amd64-win7
            yy_thunks: true
          - platform: linux
            os: ubuntu-22.04
            arch: amd64
            artifact_suffix: linux-amd64
          - platform: android
            os: ubuntu-22.04
            arch: universal
            artifact_suffix: android
          - platform: macos
            os: macos-15
            arch: amd64
            artifact_suffix: macos-amd64
          - platform: macos
            os: macos-latest
            arch: arm64
            artifact_suffix: macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: third_party/EasyTier

      - name: Install Linux Dependencies
        if: matrix.platform == 'linux' || matrix.platform == 'android'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev libayatana-appindicator3-dev pkg-config protobuf-compiler

      - name: Setup Java
        if: matrix.platform == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Android SDK
        if: matrix.platform == 'android'
        uses: android-actions/setup-android@v3

      - name: Install macOS Dependencies
        if: matrix.platform == 'macos'
        run: brew install protobuf

      - name: Install Windows Dependencies
        if: matrix.platform == 'windows'
        run: choco install protoc -y

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter Dependencies
        run: |
          flutter --version
          flutter pub get

      - name: Build Windows
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          if ("${{ matrix.yy_thunks }}" -eq "true") {
            flutter build windows --release --dart-define=FLEASYTIER_ENABLE_YY_THUNKS=true
          } else {
            flutter build windows --release
          }

      - name: Build Linux
        if: matrix.platform == 'linux'
        run: flutter build linux --release

      - name: Build Android JNI Libraries
        if: matrix.platform == 'android'
        run: bash tool/prepare_easytier_android.sh

      - name: Prepare Android Release Keystore
        if: matrix.platform == 'android'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"
          KEYSTORE_PATH="$RUNNER_TEMP/android-release.keystore"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          echo "ANDROID_KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"

      - name: Build Android APK
        if: matrix.platform == 'android'
        env:
          FLEASYTIER_SKIP_ANDROID_JNI_BUILD: 1
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: flutter build apk --release

      - name: Build macOS
        if: matrix.platform == 'macos'
        run: flutter build macos --release

      - name: Package Windows Zip
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath "FlEasyTier-${version}-${{ matrix.artifact_suffix }}.zip"

      - name: Package Windows Setup
        if: matrix.platform == 'windows'
        shell: pwsh
        env:
          SOURCE_DIR: ${{ github.workspace }}\build\windows\x64\runner\Release
          OUTPUT_DIR: ${{ github.workspace }}
          OUTPUT_FILENAME: FlEasyTier-${{ github.ref_name }}-${{ matrix.artifact_suffix }}-setup
          ICON_FILE: ${{ github.workspace }}\windows\runner\resources\app_icon.ico
          APP_VERSION: ${{ github.ref_name }}
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" windows\packaging\exe\inno_setup.iss

      - name: Package Linux
        if: matrix.platform == 'linux'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd build/linux/x64/release/bundle
          tar -czf "${GITHUB_WORKSPACE}/FlEasyTier-${VERSION}-linux-${{ matrix.arch }}.tar.gz" .

      - name: Package Android APK
        if: matrix.platform == 'android'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cp build/app/outputs/flutter-apk/app-release.apk \
            "${GITHUB_WORKSPACE}/FlEasyTier-${VERSION}-android.apk"

      - name: Package macOS
        if: matrix.platform == 'macos'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd build/macos/Build/Products/Release
          zip -r "${GITHUB_WORKSPACE}/FlEasyTier-${VERSION}-macos-${{ matrix.arch }}.zip" FlEasyTier.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.platform }}-${{ matrix.artifact_suffix }}
          path: FlEasyTier-*
          overwrite: true

  release:
    permissions: write-all
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist/
          pattern: artifact-*
          merge-multiple: true

      - name: Generate SHA256
        if: env.IS_STABLE == 'true'
        run: |
          cd ./dist
          for file in $(find . -type f -not -name "*.sha256"); do
            sha256sum "$file" > "${file}.sha256"
          done

      - name: Release
        if: env.IS_STABLE == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/*
