name: fleasytier
description: A Flutter GUI for EasyTier mesh VPN.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  path_provider: ^2.1.5
  uuid: ^4.5.1
  window_manager: ^0.4.3
  tray_manager: ^0.5.2
  toml: ^0.18.0
  file_picker: ^10.3.10
  package_info_plus: ^8.3.1
  url_launcher: ^6.3.2
  font_awesome_flutter: ^10.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/tray_icon.ico
    - assets/tray_icon.png
